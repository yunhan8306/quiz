<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 — 페이지를 찾을 수 없음</title>
  <meta name="theme-color" content="#10141c">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2310141c'/%3E%3Ctext x='50' y='54' font-size='60' text-anchor='middle' dominant-baseline='central'%3E%F0%9F%93%9A%3C/text%3E%3C/svg%3E">
  <style>
    :root { --bg:#10141c; --text:#e6ebf5; --dim:#8b96ad; --accent:#5b9cff; }
    * { box-sizing: border-box; }
    body {
      margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
      background:var(--bg); color:var(--text);
      font-family:"Apple SD Gothic Neo","Pretendard","Noto Sans KR",system-ui,sans-serif;
      text-align:center; padding:24px;
    }
    .box { max-width:420px; }
    .code { font-size:64px; font-weight:800; letter-spacing:-0.03em; margin:0; }
    p { color:var(--dim); margin:12px 0 28px; line-height:1.6; }
    a {
      display:inline-block; color:var(--accent); text-decoration:none;
      border:1px solid var(--accent); border-radius:999px; padding:9px 20px; font-weight:600;
    }
    a:hover { background:rgba(91,156,255,0.14); }
  </style>
</head>
<body>
  <div class="box">
    <p class="code">404</p>
    <p>찾으시는 페이지가 없어요.<br>퀴즈 목록에서 다시 시작해 주세요.</p>
    <a href="/quiz/">📚 퀴즈 목록으로</a>
  </div>
</body>
</html>
